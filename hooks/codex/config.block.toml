# BEGIN agent-kit managed codex hooks
[[hooks.PreToolUse]]
matcher = "Bash"

[[hooks.PreToolUse.hooks]]
type = "command"
command = "{{AGENT_HOME}}/hooks/codex/block-direct-git-commit.py"
timeout = 10
statusMessage = "agent-kit: Block direct git commit"

[[hooks.PreToolUse.hooks]]
type = "command"
command = "{{AGENT_HOME}}/hooks/codex/semantic-commit-body-gate.py"
timeout = 10
statusMessage = "agent-kit: Require semantic-commit body"

[[hooks.PreToolUse.hooks]]
type = "command"
command = "{{AGENT_HOME}}/hooks/codex/block-direct-python.py"
timeout = 10
statusMessage = "agent-kit: Block bare Python in managed repos"

[[hooks.PreToolUse.hooks]]
type = "command"
command = "{{AGENT_HOME}}/hooks/codex/block-direct-pr-create.py"
timeout = 10
statusMessage = "agent-kit: Block direct PR/MR creation"

[[hooks.PreToolUse]]
matcher = "Write|Edit|NotebookEdit|apply_patch"

[[hooks.PreToolUse.hooks]]
type = "command"
command = "{{AGENT_HOME}}/hooks/codex/block-project-memory-write.py"
timeout = 10
statusMessage = "agent-kit: Protect project memory writes"

[[hooks.PreToolUse.hooks]]
type = "command"
command = "{{AGENT_HOME}}/hooks/codex/mcp-secret-scan.py"
timeout = 10
statusMessage = "agent-kit: Scan .mcp.json for secrets"

[[hooks.PreToolUse.hooks]]
type = "command"
command = "{{AGENT_HOME}}/hooks/codex/agent-scope-lock-guard.py"
timeout = 10
statusMessage = "agent-kit: Validate active scope lock"

[[hooks.UserPromptSubmit]]
matcher = ""

[[hooks.UserPromptSubmit.hooks]]
type = "command"
command = "{{AGENT_HOME}}/hooks/codex/user-prompt-agent-docs.sh"
timeout = 10
statusMessage = "agent-kit: Remind agent-docs preflight"

[[hooks.UserPromptSubmit.hooks]]
type = "command"
command = "{{AGENT_HOME}}/hooks/codex/skill-usage-reminder.py"
timeout = 10
statusMessage = "agent-kit: Remind skill-usage recording"

[[hooks.SessionStart]]
matcher = "startup|resume|clear"

[[hooks.SessionStart.hooks]]
type = "command"
command = "{{AGENT_HOME}}/hooks/codex/session-start-healthcheck.sh"
timeout = 20
statusMessage = "agent-kit: Check baseline health"

[[hooks.Stop]]
matcher = ""

[[hooks.Stop.hooks]]
type = "command"
command = "{{AGENT_HOME}}/hooks/codex/stop-pre-pr-reminder.sh"
timeout = 10
statusMessage = "agent-kit: Remind PR readiness"

[[hooks.Stop.hooks]]
type = "command"
command = "{{AGENT_HOME}}/hooks/codex/agent-scope-lock-guard.py"
timeout = 10
statusMessage = "agent-kit: Report scope lock violations"
# END agent-kit managed codex hooks
